# =============================================================================
# Chrono Engine - 跑团游戏引擎配置
# Phase 2: 真实 LLM 集成 (DeepSeek)
# =============================================================================

spring:
  application:
    name: chrono-engine
    version: Phase-2

  # ===========================================================================
  # Java 21 虚拟线程配置（核心特性）
  # ===========================================================================
  threads:
    virtual:
      # 启用虚拟线程，替代传统线程池
      # 虚拟线程由 JVM 管理，可轻松支撑 10万+ 并发连接
      # 特别适合 SSE 长连接和 I/O 等待场景
      enabled: true

  # ===========================================================================
  # Web 服务器配置 (Tomcat)
  # ===========================================================================
  servlet:
    multipart:
      # 禁用文件上传（本项目不需要）
      enabled: false

# =============================================================================
# 嵌入式服务器配置
# =============================================================================
server:
  # 服务端口
  port: 8080
  
  # 连接配置
  tomcat:
    # 最大连接数（虚拟线程模式下可设置较大值）
    max-connections: 10000
    
    # 接受队列长度
    accept-count: 100
    
    # 线程配置（虚拟线程模式下，传统线程池配置被忽略）
    threads:
      # 最小工作线程（保留少量平台线程处理非虚拟线程任务）
      min-spare: 10
      # 最大工作线程（虚拟线程模式下此值不限制并发）
      max: 200
    
    # 连接超时
    connection-timeout: 2s
  
  # 错误处理
  error:
    include-message: always
    include-binding-errors: always

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level:
    # 根日志级别
    root: INFO
    
    # Chrono Engine 包日志
    com.chrono.engine: DEBUG
    
    # Spring Web 日志（查看请求处理详情）
    org.springframework.web: INFO
    
    # Tomcat 日志
    org.apache.catalina: WARN
  
  pattern:
    # 控制台日志格式：时间 [线程名] 级别 类名 - 消息
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# =============================================================================
# DeepSeek LLM 配置
# =============================================================================
deepseek:
  # API Key（推荐从环境变量读取，生产环境不要硬编码）
  api-key: ${DEEPSEEK_API_KEY:sk-82cece4579f04e43b04cdd223b2df02b}
  
  # API 基础 URL
  base-url: https://api.deepseek.com
  
  # 使用的模型
  # - deepseek-chat: DeepSeek-V3，通用对话，适合剧情生成
  # - deepseek-coder: DeepSeek-Coder，代码相关任务
  model: deepseek-chat
  
  # 温度参数（0.0-1.0）：控制生成文本的随机性
  # - 0.0: 确定性输出，适合规则判定
  # - 0.7-0.9: 创造性输出，适合剧情生成
  temperature: 0.8
  
  # 最大生成 token 数（1 个中文约 1-2 token）
  max-tokens: 500
  
  # 请求超时时间（秒）
  timeout-seconds: 60

# =============================================================================
# 应用自定义配置
# =============================================================================
chrono:
  engine:
    # SSE 配置
    sse:
      # 连接超时（分钟）
      timeout-minutes: 5
      # 心跳间隔（秒，0 表示禁用心跳）
      heartbeat-interval: 0
